name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        run: python -m ruff check src tests

  pytest_x86:
    name: pytest x86
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install MCAP CLI
        run: |
          go install github.com/foxglove/mcap/go/cli/mcap@v1.7.4
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/ -q

  pytest_macos:
    name: pytest macOS
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install MCAP CLI
        run: |
          go install github.com/foxglove/mcap/go/cli/mcap@v1.7.4
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/ -q

  pytest_arm64:
    name: pytest ARM64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run pytest in ARM64 container
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "${PWD}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            sh -lc '
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq git golang-go
              export PATH="${PATH}:/root/go/bin"
              go install github.com/foxglove/mcap/go/cli/mcap@v1.7.4
              python -m pip install --upgrade pip
              python -m pip install -e ".[dev]"
              python -m pytest tests/ -q
            '
