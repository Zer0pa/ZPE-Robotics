name: IT03 IT05 Composition

on:
  workflow_dispatch:

jobs:
  it03_it05_composition:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync development environment
        run: uv sync --dev

      - name: Run composition proof
        run: |
          uv run python scripts/it03_it05_composition.py \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --output "proofs/reruns/it03_it05_composition_${GITHUB_RUN_ID}/it03_it05_composition_result.json"

      - name: Upload composition evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: it03-it05-composition-evidence
          path: proofs/reruns/it03_it05_composition_${{ github.run_id }}/it03_it05_composition_result.json
          if-no-files-found: error

      - name: Enforce decisive composition result
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("proofs/reruns") / f"it03_it05_composition_{os.environ['GITHUB_RUN_ID']}" / "it03_it05_composition_result.json"
          if not path.exists():
              raise SystemExit("IT03/IT05 artifact missing")
          payload = json.loads(path.read_text(encoding="utf-8"))
          if payload.get("status") != "PASS":
              raise SystemExit(f"IT03/IT05 failed: status={payload.get('status')}")
          PY
