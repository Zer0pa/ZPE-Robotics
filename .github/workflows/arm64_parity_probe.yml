name: ARM64 Parity Probe

on:
  workflow_dispatch:

jobs:
  arm64_parity_probe:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run ARM64 parity probe
        id: run_arm64_parity
        continue-on-error: true
        run: |
          mkdir -p "proofs/reruns/arm64_parity_probe_${GITHUB_RUN_ID}"
          docker run --rm \
            --platform linux/arm64 \
            -e GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            sh -lc '
              python scripts/arm64_parity_probe.py \
                --workflow-run-id "${GITHUB_RUN_ID}" \
                --output "proofs/reruns/arm64_parity_probe_${GITHUB_RUN_ID}/arm64_parity_result.json"
            '

      - name: Upload ARM64 parity evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: arm64-parity-evidence
          path: proofs/reruns/arm64_parity_probe_${{ github.run_id }}/arm64_parity_result.json
          if-no-files-found: error

      - name: Enforce decisive ARM64 parity result
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("proofs/reruns") / f"arm64_parity_probe_{os.environ['GITHUB_RUN_ID']}" / "arm64_parity_result.json"
          if not path.exists():
              raise SystemExit("arm64 parity artifact missing")

          payload = json.loads(path.read_text(encoding="utf-8"))
          if not payload.get("hashes_match"):
              raise SystemExit(
                  "ARM64 parity failed: "
                  f"status={payload.get('status')} hash={payload.get('roundtrip_sha256')}"
              )
          PY
