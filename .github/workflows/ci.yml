name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        run: python -m ruff check src tests

  pytest:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-13"]
        python-version: ["3.11", "3.12"]
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install MCAP CLI (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L https://github.com/foxglove/mcap/releases/download/releases/mcap-cli/v0.0.62/mcap-linux-amd64 -o /usr/local/bin/mcap
          chmod +x /usr/local/bin/mcap

      - name: Install MCAP CLI (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L https://github.com/foxglove/mcap/releases/download/releases/mcap-cli/v0.0.62/mcap-macos-amd64 -o /usr/local/bin/mcap
          chmod +x /usr/local/bin/mcap

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests -q

  pytest-arm64:
    name: pytest (arm64, py3.11)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run pytest in ARM64 container
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "${PWD}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            sh -lc '
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq curl
              curl -L https://github.com/foxglove/mcap/releases/download/releases/mcap-cli/v0.0.62/mcap-linux-arm64 -o /usr/local/bin/mcap
              chmod +x /usr/local/bin/mcap
              python -m pip install --upgrade pip
              python -m pip install -e ".[dev]"
              python -m pytest tests -q
            '
