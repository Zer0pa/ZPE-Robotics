name: M1 ROS2 Probe

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  m1_ros2_probe:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --frozen --extra dev

      - name: Pull ROS Humble base image
        run: docker pull ros:humble-ros-base-jammy

      - name: Run hosted M1 probe inside ROS container
        id: run_m1_probe
        continue-on-error: true
        run: |
          mkdir -p "proofs/reruns/m1_ros2_probe_${GITHUB_RUN_ID}"
          docker run --rm \
            -e GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            ros:humble-ros-base-jammy \
            bash -lc '
              install_command=$'"'"'apt-get update -qq && \
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq python3-colcon-common-extensions && \
              (DEBIAN_FRONTEND=noninteractive apt-get install -y -qq ros-humble-moveit || \
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq ros-humble-moveit-ros-planning)'"'"'
              python3 scripts/m1_ros2_probe.py \
                --workflow-run-id "${GITHUB_RUN_ID}" \
                --output "proofs/reruns/m1_ros2_probe_${GITHUB_RUN_ID}/m1_ros2_probe_result.json" \
                --install-command "${install_command}"
            '

      - name: Upload M1 probe evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: m1-ros2-probe-evidence
          path: proofs/reruns/m1_ros2_probe_${{ github.run_id }}/m1_ros2_probe_result.json
          if-no-files-found: error

      - name: Enforce decisive M1 result
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("proofs/reruns") / f"m1_ros2_probe_{__import__('os').environ['GITHUB_RUN_ID']}" / "m1_ros2_probe_result.json"
          if not path.exists():
              raise SystemExit("m1 probe artifact missing")

          payload = json.loads(path.read_text(encoding="utf-8"))
          if payload.get("status") != "PASS":
              raise SystemExit(f"M1 probe failed: status={payload.get('status')}")
          PY
