name: E-G3 Comparator

on:
  workflow_dispatch:

jobs:
  e_g3_comparator:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync development environment
        run: uv sync --dev

      - name: Run E-G3 comparator
        run: |
          uv run python scripts/e_g3_comparator.py \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --output "proofs/reruns/e_g3_closure_2026-03-17/e_g3_comparator_result.json"

      - name: Upload E-G3 comparator evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e_g3-comparator-evidence
          path: proofs/reruns/e_g3_closure_2026-03-17/e_g3_comparator_result.json
          if-no-files-found: error

      - name: Enforce decisive E-G3 result
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("proofs/reruns/e_g3_closure_2026-03-17/e_g3_comparator_result.json")
          if not path.exists():
              raise SystemExit("E-G3 comparator artifact missing")
          payload = json.loads(path.read_text(encoding="utf-8"))
          if payload.get("status") != "PASS":
              raise SystemExit(f"E-G3 comparator failed: status={payload.get('status')}")
          PY
